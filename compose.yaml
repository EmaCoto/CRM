services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: laravel-crm-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - crm

  web:
    image: nginx:1.27-alpine
    container_name: laravel-crm-web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - crm

  mysql:
    image: mysql:8.0
    container_name: laravel-crm-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-laravel-crm}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_ROOT_HOST: "%"
    ports:
      - "33060:3306"
    command:
      - --sql-mode=
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - crm

  redis:
    image: redis:7-alpine
    container_name: laravel-crm-redis
    restart: unless-stopped
    ports:
      - "63790:6379"
    volumes:
      - redis-data:/data
    networks:
      - crm

  mailpit:
    image: axllent/mailpit:v1.25
    container_name: laravel-crm-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - crm

  phpmyadmin:
    image: phpmyadmin:5-apache
    container_name: laravel-crm-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${DB_PASSWORD:-root}
      UPLOAD_LIMIT: 64M
    ports:
      - "8081:80"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - crm

  node:
    image: node:20-alpine
    container_name: laravel-crm-node
    working_dir: /var/www/html
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./:/var/www/html
    networks:
      - crm
    profiles:
      - vite

  composer:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /var/www/html
    entrypoint: ["composer"]
    command: ["install"]
    volumes:
      - ./:/var/www/html
    networks:
      - crm
    profiles:
      - tools

  artisan:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /var/www/html
    entrypoint: ["php", "artisan"]
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - crm
    profiles:
      - tools

volumes:
  mysql-data:
  redis-data:

networks:
  crm:
    driver: bridge
